<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="dev.agentos.Privileged1"/>
  </policy>
  <policy group="agentos">
    <allow send_destination="dev.agentos.Privileged1"/>
  </policy>
  <policy context="default">
    <deny own="dev.agentos.Privileged1"/>
    <deny send_destination="dev.agentos.Privileged1"/>
  </policy>
</busconfig>
