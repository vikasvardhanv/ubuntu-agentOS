openapi: 3.1.0
info:
  title: AgentOS Local API
  version: 1.0.0
  description: Local control-plane API. Production deployments use Unix socket peer identity.
servers:
  - url: http://127.0.0.1:7788
paths:
  /v1/health:
    get:
      operationId: health
      description: Gateway readiness, configured providers, and circuit state.
      responses:
        "200":
          description: Healthy
  /v1/agents:
    get:
      operationId: listAgents
      responses:
        "200":
          description: Registered agents
    post:
      operationId: registerAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, capabilities]
              properties:
                name: {type: string}
                capabilities: {type: array, items: {type: string}}
      responses:
        "201":
          description: Registered
        "403":
          description: Denied by policy
  /v1/tools:
    get:
      operationId: listTools
      responses:
        "200":
          description: Available capability manifests
  /v1/chat/completions:
    post:
      operationId: createChatCompletion
      description: OpenAI-compatible inference endpoint with provider:model routing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [model, messages]
              properties:
                model:
                  type: string
                  examples: [ollama:qwen3, openrouter:anthropic/claude-sonnet-4]
                messages:
                  type: array
                  items: {type: object}
                tools:
                  type: array
                  items: {type: object}
                route_policy:
                  type: object
                  properties:
                    providers: {type: array, items: {type: string}}
                    require: {type: array, items: {type: string}}
                    local_only: {type: boolean}
                    data_collection: {enum: [allow, deny]}
                    upstream_only: {type: array, items: {type: string}}
                    upstream_ignore: {type: array, items: {type: string}}
                    sort: {enum: [price, latency, throughput]}
                    require_parameters: {type: boolean}
      responses:
        "200":
          description: Normalized completion
        "403":
          description: Denied by policy
        "502":
          description: All eligible provider routes failed
